name: eval

on:
  pull_request:
    paths:
      - "src/palisade/matching/**"
      - "src/palisade/enrichment/**"
      - "src/palisade/scanner.py"
      - "src/palisade/ingestion/normalize.py"
      - "evals/**"

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen --extra dev
      # Non-blocking for now; add `--gate` to enforce _THRESHOLDS once the golden set grows.
      - name: Run golden eval
        run: uv run python -m evals.run_eval
      - uses: actions/upload-artifact@v4
        with:
          name: eval-metrics
          path: evals/metrics.json
